<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Serviços</title>

<style>
body {
    font-family: Arial;
    background: #f1f5f9;
    margin: 0;
    text-align: center;
}

.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 20px;
}

.card {
    border: 1px solid #ddd;
    padding: 20px;
    margin: 15px;
    border-radius: 10px;
    display: inline-block;
    width: 250px;
    vertical-align: top;
}

.card h3 {
    color: #2563eb;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th, td {
    border: 1px solid #ddd;
    padding: 12px;
}

th {
    background: #2563eb;
    color: white;
}
</style>
</head>

<body>

<div class="container">

    <nav>
        <a href="index.html">Início</a> |
        <a href="contato.html">Contato</a>
    </nav>

    <h1>Serviços</h1>

    <div class="card">
        <h3>Sites</h3>
        <p>Criação de sites modernos e responsivos.</p>
    </div>

    <div class="card">
        <h3>Sistemas</h3>
        <p>Desenvolvimento de sistemas personalizados.</p>
    </div>

    <div class="card">
        <h3>Consultoria</h3>
        <p>Suporte estratégico em TI.</p>
    </div>
    <h2>Preços</h2>

    <table>
        <tr>
            <th>Serviço</th>
            <th>Descrição</th>
            <th>Preço</th>
        </tr>

        <tr>

        </tr>

        <tr>
            <td>Sistema</td>

        </tr>

        <tr>

        </tr>
    </table>

</div>

</html>
